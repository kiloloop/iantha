name: Validate

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check code files for absolute paths
        run: |
          if grep -rn '/Users/\|/home/[a-z]' \
            --include='*.py' --include='*.yaml' --include='*.yml' \
            --include='*.sh' --include='*.toml' --include='*.json' \
            --exclude-dir='.github' \
            . 2>/dev/null; then
            echo "ERROR: Found absolute paths in code files — replace with ~/, \$HOME, or a placeholder."
            exit 1
          fi
          echo "No absolute paths in code files."

      - name: Check all files for known-bad usernames
        run: |
          # Hard fail on concrete personal usernames anywhere in the tree.
          # Add new patterns here as needed; deliberately matches uppercase too.
          if grep -rni '\bhaoranc\b\|\bspbkgw' \
            --exclude-dir='.git' --exclude-dir='.worktrees' \
            . 2>/dev/null; then
            echo "ERROR: Found personal usernames — scrub before merging."
            exit 1
          fi
          echo "No personal usernames found."

      - name: Python syntax check
        run: |
          set -e
          py_files=$(find . -name '*.py' -not -path './.git/*' -not -path './.worktrees/*')
          if [ -z "$py_files" ]; then
            echo "No Python files to check."
            exit 0
          fi
          for f in $py_files; do
            python3 -m py_compile "$f"
          done
          echo "All Python files compile cleanly."

      - name: Validate YAML files
        run: |
          python3 - << 'PYEOF'
          import sys
          import glob
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "--quiet", "pyyaml"])
              import yaml

          errors = []
          patterns = ["config.yaml", "*.yml", "*.yaml", ".github/**/*.yml"]
          seen = set()
          for pattern in patterns:
              for path in glob.glob(pattern, recursive=True):
                  if path in seen or path.startswith(".git/") or path.startswith(".worktrees/"):
                      continue
                  seen.add(path)
                  try:
                      with open(path) as fh:
                          list(yaml.safe_load_all(fh))
                  except yaml.YAMLError as e:
                      errors.append(f"{path}: invalid YAML — {e}")
          if errors:
              for err in errors:
                  print(f"ERROR: {err}", file=sys.stderr)
              sys.exit(1)
          print(f"Validated {len(seen)} YAML file(s) — all parse cleanly.")
          PYEOF

      - name: Validate SKILL.md frontmatter
        run: |
          python3 - << 'PYEOF'
          import sys
          import glob
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "--quiet", "pyyaml"])
              import yaml

          errors = []
          paths = sorted(glob.glob(".claude/skills/*/SKILL.md"))
          for path in paths:
              with open(path) as fh:
                  content = fh.read()
              if not content.startswith("---"):
                  errors.append(f"{path}: missing YAML frontmatter (must start with ---)")
                  continue
              parts = content.split("---", 2)
              if len(parts) < 3:
                  errors.append(f"{path}: malformed frontmatter (missing closing ---)")
                  continue
              try:
                  fm = yaml.safe_load(parts[1])
              except yaml.YAMLError as e:
                  errors.append(f"{path}: invalid frontmatter YAML — {e}")
                  continue
              if not isinstance(fm, dict):
                  errors.append(f"{path}: frontmatter must be a mapping")
                  continue
              for field in ("name", "description"):
                  if field not in fm:
                      errors.append(f"{path}: frontmatter missing '{field}'")
          if errors:
              for err in errors:
                  print(f"ERROR: {err}", file=sys.stderr)
              sys.exit(1)
          print(f"Validated {len(paths)} SKILL.md file(s) — frontmatter present and well-formed.")
          PYEOF
